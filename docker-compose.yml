version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rmm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rmm}
      POSTGRES_USER: ${POSTGRES_USER:-rmm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rmm_user} -d ${POSTGRES_DB:-rmm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rmm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rmm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rmm_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rmm}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@rmm.local}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
    ports:
      - "4000:4000"
    networks:
      - rmm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
    container_name: rmm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - rmm-network

volumes:
  postgres_data:

networks:
  rmm-network:
    driver: bridge
